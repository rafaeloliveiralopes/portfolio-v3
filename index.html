<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ======================= SEO Managed by React (SeoHead component) ======================= -->
    <!-- All title, description, canonical, hreflang, OG, and Twitter tags are dynamically injected by SeoHead.tsx -->
    <!-- This avoids duplicate/conflicting tags and enables proper i18n SEO -->

    <!-- ======================= Crawling ======================= -->
    <meta
      name="robots"
      content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
    />
    <meta name="googlebot" content="index,follow" />
    <meta name="author" content="Rafael Lopes" />
    <meta
      name="keywords"
      content="AI chatbot development, AI engineer, AI governance, generative AI, LLM integration, AI automation, custom chatbots, AI compliance, AI strategy, machine learning consulting, OpenAI integration, enterprise AI solutions, chatbot services, AI consulting"
    />

    <!-- ======================= PWA / Aparência ======================= -->
    <!-- <link rel="manifest" href="/site.webmanifest"> -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicons for different devices and sizes -->
    <!-- SVG favicon for modern browsers (best quality, scalable) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- ICO fallback for older browsers -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link
      rel="icon"
      href="/favicon-192x192.png"
      type="image/png"
      sizes="192x192"
    />
    <link
      rel="icon"
      href="/favicon-512x512.png"
      type="image/png"
      sizes="512x512"
    />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/favicon-180x180.png" sizes="180x180" />
